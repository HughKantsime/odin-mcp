name: Tests

# Runs the MCP integration test suite on every push and PR.
# 22 tests against a node-native mock ODIN server (see
# test/client.test.ts + test/mock_server.ts). No external deps,
# runs in ~1s. Ensures the client contract stays intact across
# the Phase 1 backend primitives (idempotency, dry-run, error
# envelope, media-type preservation, 409 flavors).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  test:
    name: Integration tests
    runs-on: macos-self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
